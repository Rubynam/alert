pekko {
  actor {
    provider = "cluster"

    # Serialization configuration
    serialization-bindings {
      "org.example.alert.domain.model.queue.PriceEventMessage" = jackson-json
      "org.example.alert.domain.model.queue.AlertConfig" = jackson-json
    }

    allow-java-serialization = off
  }

  cluster {
    # Cluster sharding configuration with persistent state
    sharding {
      # Number of shards for symbol matching actors
      # Higher number = better distribution for large actor count (600k actors)
      number-of-shards = 1000

      # Passivate idle actors after 10 minutes (for alert fetchers)
      passivate-idle-entity-after = 10m

      # Remember entities across cluster restarts
      remember-entities = on

      # State store mode for remember-entities (persistent storage)
      state-store-mode = persistence

      # Distributed data settings for shard coordination
      distributed-data {
        # Absolute path for durable storage of shard locations
        durable.lmdb.dir = "pekko_data/sharding"

        # Increase max delta elements for large clusters
        max-delta-elements = 1000
      }

      # Rebalancing strategy optimized for 600k actors
      rebalance-interval = 30s
      least-shard-allocation-strategy {
        rebalance-threshold = 10
        max-simultaneous-rebalance = 10
      }

      # Buffer size for entity messages (important for high actor count)
      buffer-size = 100000

      # Tuning for large number of entities
      waiting-for-state-timeout = 10s
      updating-state-timeout = 10s
    }

    # Seed nodes for cluster formation (can be configured per environment)
    # For internal network: add other node addresses
    # Example: seed-nodes = ["pekko://AlertMatchingSystem@node1:2551", "pekko://AlertMatchingSystem@node2:2551"]
    seed-nodes = ["pekko://AlertMatchingSystem@127.0.0.1:2551"]

    # Minimum number of members before the cluster is considered up
    min-nr-of-members = 1

    # Auto-down unreachable nodes (use with caution in production)
    auto-down-unreachable-after = 10s

    # Cluster roles
    roles = ["matching"]

    # Failure detector settings for network reliability
    failure-detector {
      # Heartbeat interval
      heartbeat-interval = 1s
      # Acceptable heartbeat pause
      acceptable-heartbeat-pause = 3s
    }
  }

  # Remote configuration for internal network sharing
  remote {
    artery {
      canonical {
        # Bind to all interfaces for internal network sharing
        hostname = "127.0.0.1"
        port = 2551
      }
      # Advanced transport settings for network sharing
      advanced {
        # Maximum frame size for large messages
        maximum-frame-size = 256000b
        # Buffer pool size
        buffer-pool-size = 128
        # Maximum number of outbound message streams
        maximum-large-frame-size = 2 MiB
        # Compression
        compression {
          actor-refs {
            advertisement-interval = 1 minute
          }
          manifests {
            advertisement-interval = 1 minute
          }
        }
      }
    }
    # Enable passive connections for sharing
    use-passive-connections = on
  }

  # Persistence configuration with absolute path for sharded storage
  persistence {
    journal {
      plugin = "pekko.persistence.journal.leveldb"
      leveldb {
        # Absolute path for journal storage
        dir = "pekko_data/journal"
        native = off
      }
    }
    snapshot-store {
      plugin = "pekko.persistence.snapshot-store.local"
      local {
        # Absolute path for snapshot storage
        dir = "pekko_data/snapshots"
      }
    }
  }

  # Logging configuration
  loglevel = "INFO"
  log-dead-letters = 10
  log-dead-letters-during-shutdown = off

  actor {
    debug {
      receive = off
      autoreceive = off
      lifecycle = off
    }
  }

  # Dispatcher configuration for matching actors
  matching-dispatcher {
    type = Dispatcher
    executor = "thread-pool-executor"
    thread-pool-executor {
      fixed-pool-size = 16
    }
    throughput = 100
  }

  # Dispatcher configuration for alert fetcher actors (optimized for 600k actors)
  fetcher-dispatcher {
    type = Dispatcher
    executor = "fork-join-executor"
    fork-join-executor {
      # Parallelism factor (actors per core)
      parallelism-factor = 3.0
      # Minimum parallelism
      parallelism-min = 32
      # Maximum parallelism
      parallelism-max = 128
    }
    # Throughput for batching
    throughput = 50
  }
}