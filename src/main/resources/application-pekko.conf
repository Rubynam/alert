pekko {
  actor {
    provider = "cluster"

    # Serialization configuration
    serialization-bindings {
      "org.example.alert.domain.model.queue.PriceEventMessage" = jackson-json
      "org.example.alert.domain.model.queue.AlertConfig" = jackson-json
    }

    allow-java-serialization = off
  }

  cluster {
    # Cluster sharding configuration
    sharding {
      # Number of shards for symbol matching actors
      number-of-shards = 100

      # Passivate idle actors after 5 minutes
      passivate-idle-entity-after = 5m

      # Remember entities across cluster restarts
      remember-entities = on

      # Rebalancing strategy
      rebalance-interval = 10s
      least-shard-allocation-strategy {
        rebalance-threshold = 3
        max-simultaneous-rebalance = 5
      }
    }

    # Seed nodes for cluster formation
    seed-nodes = []

    # Auto-down unreachable nodes (use with caution in production)
    auto-down-unreachable-after = 10s

    # Cluster roles
    roles = ["matching"]
  }

  # Remote configuration
  remote {
    artery {
      canonical {
        hostname = "127.0.0.1"
        port = 2551
      }
    }
  }

  # Persistence configuration (if needed for future)
  persistence {
    journal {
      plugin = "pekko.persistence.cassandra.journal"
    }
    snapshot-store {
      plugin = "pekko.persistence.cassandra.snapshot"
    }
  }

  # Logging configuration
  loglevel = "INFO"
  log-dead-letters = 10
  log-dead-letters-during-shutdown = off

  actor {
    debug {
      receive = off
      autoreceive = off
      lifecycle = off
    }
  }

  # Dispatcher configuration for matching actors
  matching-dispatcher {
    type = Dispatcher
    executor = "thread-pool-executor"
    thread-pool-executor {
      fixed-pool-size = 16
    }
    throughput = 100
  }
}