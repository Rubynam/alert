spring:
  application:
    name: alert-matching-system

  # Kafka Configuration
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: alert-consumer-group
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

# Sink Connector Configuration (Kafka Consumer)
sink-connector:
  topic: price-events              # Kafka topic to consume from
  alert:
    enabled: true
    consumer-group: chart1m-alert-consumer
    backpressure-buffer-size: 1000

# Alert System Configuration
alert:
  # Dual-queue matching settings
  matching:
    poll-interval: 1s              # How often actors poll queues
    queue-max-size: 10000          # Max events per symbol queue
    passivation-timeout: 5m        # Idle timeout for actors

  # Queue monitoring
  queue:
    price-queue:
      enabled: true
      max-size-per-symbol: 10000
    alert-user-queue:
      enabled: true
      max-size-per-symbol: 1000

# Logging configuration
logging:
  level:
    root: INFO
    org.example.alert: DEBUG
    org.apache.pekko: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"