spring:
  application:
    name: alert-matching-system

  # Scylla DB / Cassandra Configuration (Master-Slave)
  cassandra:
    contact-points: 127.0.0.1
    port: 9042
    keyspace-name: market
    local-datacenter: ${SCYLLA_DATACENTER:datacenter1}
    schema-action: none
    username: market_user
    password: abc@1234
    request:
      timeout: 30s
      consistency: quorum
    connection:
      connect-timeout: 10s
      init-query-timeout: 10s
    pool:
      idle-timeout: 60s
      heartbeat-interval: 30s

  # Kafka Configuration
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: alert-consumer-group
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

# Sink Connector Configuration (Kafka Consumer)
sink-connector:
  topic: inbound-symbol-source             # Kafka topic to consume from
  alert:
    enabled: true
    consumer-group: alert-consumer-groups
    backpressure-buffer-size: 1000

# Alert System Configuration
alert:
  # Dual-queue matching settings
  matching:
    poll-interval: 1s              # How often actors poll queues
    queue-max-size: 10000          # Max events per symbol queue
    passivation-timeout: 5m        # Idle timeout for actors

  # Queue monitoring
  queue:
    price-queue:
      enabled: true
      max-size-per-symbol: 10000
    alert-user-queue:
      enabled: true
      max-size-per-symbol: 1000

# Logging configuration
logging:
  level:
    root: INFO
    org.example.alert: INFO
    org.apache.pekko: INFO